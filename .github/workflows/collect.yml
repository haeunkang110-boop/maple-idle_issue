name: 메키 이슈 히스토리 수집

on:
  workflow_dispatch:
    inputs:
      issue_input:
        description: '분석할 이슈 내용 입력'
        required: true
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: DC 수집 + Gemini 분석
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_INPUT: ${{ github.event.inputs.issue_input }}
        run: python analyze.py

      - name: 결과 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "동향 분석: ${{ github.event.inputs.issue_input }} ($(date +'%Y-%m-%d %H:%M'))"
          git push
